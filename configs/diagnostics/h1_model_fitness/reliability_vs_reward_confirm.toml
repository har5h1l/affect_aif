[hypothesis]
id = "h1"
name = "model_fitness"

[experiment]
id = "reliability_vs_reward_confirm"
family = "trust"
rounds = 200
replications = 30
seed = 420

# Confirmation target:
# - rerun the corrected active-encounter H1 readout at 30 seeds;
# - judge precision-model-fitness coupling with active-aligned and
#   partial-correlation analysis columns;
# - do not treat aggregate payoff as the primary claim gate.
[scenario]
payoff = "binary"
assignment = "agent_choice"
partners = 4
type_volatility = 0.0
observation_noise = 0.0
initial_types = ["cooperator", "exploiter", "random", "reciprocator"]
initial_stances = ["trusting", "neutral", "neutral", "neutral"]

[[variants]]
id = "no_affect"
affect = "none"
planning_horizon = 4

[[variants]]
id = "affect"
affect = "precision"
planning_horizon = 4

[[variants]]
id = "global_beta"
affect = "global_beta"
planning_horizon = 4

[runtime]
profile = "data_collection"

[analysis]
auto = false
primary = "h1_model_fitness"
compare = ["affect", "global_beta", "no_affect"]
metrics = [
  "payoff",
  "precision",
  "model_fitness_correlation",
  "evidence_effects",
]
