[hypothesis]
id = "h6"
name = "perturbation_phenotypes"

[experiment]
id = "clinical_dynamics"
family = "trust"
rounds = 200
replications = 3
seed = 42

[scenario]
payoff = "graded"
assignment = "agent_choice"
partners = 4
type_volatility = 0.05
observation_noise = 0.0

[[variants]]
id = "affect"
affect = "precision"
planning_horizon = 4

[[variants]]
id = "alexithymia"
affect = "precision"
planning_horizon = 4
alpha_charge = 0.1

[[variants]]
id = "borderline"
affect = "precision"
planning_horizon = 4
alpha_charge = 12.0

[[variants]]
id = "depression"
affect = "precision"
planning_horizon = 4
initial_beta = 2.0

[analysis]
auto = true
primary = "h6_perturbation"
compare = ["affect", "alexithymia", "borderline", "depression"]
metrics = ["payoff", "precision", "partner_choice"]
