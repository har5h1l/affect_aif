[hypothesis]
id = "h3"
name = "locality"

[experiment]
id = "global_beta_locality_probe"
family = "trust"
rounds = 80
replications = 5
seed = 890

[scenario]
payoff = "graded"
assignment = "agent_choice"
partners = 4
type_volatility = 0.0
observation_noise = 0.0
initial_types = ["cooperator", "exploiter", "random", "reciprocator"]
initial_stances = ["trusting", "neutral", "neutral", "trusting"]
investment_levels = 6
endowment = 10.0
multiplier = 3.0

[[scenario.stance_switches]]
round = 41
partner = 3
to = "hostile"

[[variants]]
id = "no_affect"
affect = "none"
planning_horizon = 2

[[variants]]
id = "local_beta"
affect = "precision"
planning_horizon = 2

[[variants]]
id = "tracked_only"
affect = "tracked_only"
planning_horizon = 2

[[variants]]
id = "global_beta"
affect = "global_beta"
planning_horizon = 2

[runtime]
max_policies = 4096
log_policy_traces = false

[analysis]
auto = false
primary = "h3_locality"
compare = ["local_beta", "global_beta", "tracked_only", "no_affect"]
switch_window = [1, 10]
metrics = [
  "payoff",
  "precision",
  "partner_choice",
  "stance_accuracy",
  "deployment",
  "interference",
]
