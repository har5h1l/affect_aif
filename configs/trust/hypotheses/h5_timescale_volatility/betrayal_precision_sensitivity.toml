[analysis]
auto = true
primary = "h5_timescale_volatility"
compare = [
  "affect_default",
  "no_affect",
  "lesioned",
  "affect_low_alpha",
  "affect_mid_alpha",
  "affect_fast_beta",
  "affect_slow_beta",
  "affect_cautious_prior",
  "affect_soft_precision",
  "affect_low_gamma",
  "affect_no_epistemic",
  "affect_combined_caution",
]
switch_window = [1, 10]
metrics = [
  "payoff",
  "precision",
  "partner_choice",
  "return_latency",
  "conditional_reencounter_payoff",
  "misdeployment",
  "evidence_effects",
]
