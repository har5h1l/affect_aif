[hypothesis]
id = "h5"
name = "timescale_volatility"

[experiment]
id = "betrayal_precision_sensitivity"
family = "trust"
rounds = 120
replications = 30
seed = 860

[scenario]
payoff = "graded"
assignment = "agent_choice"
partners = 4
type_volatility = 0.0
observation_noise = 0.0
initial_types = ["exploiter", "cooperator", "reciprocator", "random"]
initial_stances = ["trusting", "neutral", "neutral", "neutral"]
investment_levels = 6
endowment = 10.0
multiplier = 3.0

[[scenario.stance_switches]]
round = 31
partner = 0
to = "hostile"

[[variants]]
id = "no_affect"
affect = "none"
planning_horizon = 4

[[variants]]
id = "lesioned"
affect = "tracked_only"
planning_horizon = 4

[[variants]]
id = "affect_default"
affect = "precision"
planning_horizon = 4

[[variants]]
id = "affect_low_alpha"
affect = "precision"
planning_horizon = 4
alpha_charge = 1.0

[[variants]]
id = "affect_mid_alpha"
affect = "precision"
planning_horizon = 4
alpha_charge = 2.0

[[variants]]
id = "affect_fast_beta"
affect = "precision"
planning_horizon = 4
beta_persistence = 0.6

[[variants]]
id = "affect_slow_beta"
affect = "precision"
planning_horizon = 4
beta_persistence = 0.95

[[variants]]
id = "affect_cautious_prior"
affect = "precision"
planning_horizon = 4
initial_beta = 2.0

[[variants]]
id = "affect_soft_precision"
affect = "precision"
planning_horizon = 4
