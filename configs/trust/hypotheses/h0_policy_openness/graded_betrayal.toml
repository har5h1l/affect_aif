[hypothesis]
id = "h0"
name = "policy_openness"

[experiment]
id = "graded_betrayal"
family = "trust"
rounds = 120
replications = 5
seed = 42

[scenario]
payoff = "graded"
assignment = "agent_choice"
partners = 4
type_volatility = 0.0
observation_noise = 0.0
initial_types = ["cooperator", "reciprocator", "cooperator", "random"]
initial_stances = ["trusting", "neutral", "neutral", "neutral"]
investment_levels = 6
endowment = 10.0
multiplier = 3.0

[[scenario.stance_switches]]
round = 31
partner = 0
to = "hostile"

[[variants]]
id = "no_affect"
affect = "none"
planning_horizon = 4

[[variants]]
id = "affect"
affect = "precision"
planning_horizon = 4

[[variants]]
id = "global_beta"
affect = "global_beta"
planning_horizon = 4

[analysis]
auto = true
primary = "h0_policy_openness"
compare = ["affect", "global_beta", "no_affect"]
switch_window = [1, 10]
metrics = ["payoff", "precision", "q_pi_entropy"]
