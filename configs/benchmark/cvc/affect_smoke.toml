[hypothesis]
id = "e1"
name = "benchmark_arena"

[experiment]
id = "benchmark_cvc_affect_smoke"
family = "benchmark"
rounds = 100
replications = 3
seed = 42

[scenario]
payoff = "binary"
assignment = "random"
partners = 4
type_volatility = 0.05
observation_noise = 0.0

[[variants]]
id = "benchmark"
affect = "none"
planning_horizon = 1

[analysis]
auto = false
primary = "e1_benchmark_arena"

[benchmark]
backends = ["cvc_local"]
agents = []

[[benchmark.agent_specs]]
name = "affect_cvc"
backend = "cvc_local"
kind = "policy_spec"
policy_spec = "class=benchmarks.cvc.affect_policy.AffectCvCPolicy"

[[benchmark.agent_specs]]
name = "scoring_loop"
backend = "cvc_local"
kind = "policy_spec"
policy_spec = "class=benchmarks.cvc.scoring_policy.ScoringLoopPolicy"

[[benchmark.agent_specs]]
name = "starter"
backend = "cvc_local"
kind = "policy_spec"
policy_spec = "class=cogames.policy.starter_agent.StarterPolicy"

[benchmark.cvc_local]
mission = "machina_1"
num_agents = 8
max_steps = 1000
python_bin = "python3.12"
