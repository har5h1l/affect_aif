[hypothesis]
id = "e1"
name = "benchmark_arena"

[experiment]
id = "benchmark_cvc_local_smoke"
family = "benchmark"
rounds = 100
replications = 1
seed = 42

[scenario]
payoff = "binary"
assignment = "random"
partners = 4
type_volatility = 0.05
observation_noise = 0.0

[[variants]]
id = "benchmark"
affect = "none"
planning_horizon = 1

[analysis]
auto = false
primary = "e1_benchmark_arena"

[benchmark]
backends = ["cvc_local"]
agents = []

[[benchmark.agent_specs]]
name = "teammate_reliability"
backend = "cvc_local"
kind = "policy_spec"
policy_spec = "class=benchmarks.cvc.policy.TeammateReliabilityPolicy"

[[benchmark.agent_specs]]
name = "starter"
backend = "cvc_local"
kind = "policy_spec"
policy_spec = "class=cogames.policy.starter_agent.StarterPolicy"

[benchmark.cvc_local]
mission = "machina_1"
num_agents = 8
max_steps = 250
python_bin = "python3.12"

[benchmark.observatory]
season = "default"
pool = "competition"
